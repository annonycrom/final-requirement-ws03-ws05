<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>
<body>
    <div class="dashboard">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">Motive</div>
    <nav>
      <ul>
        <li>Dashboard</li>
        <li>Cars</li>
        <!-- Add more menu items -->
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Search/Filter Section -->
    <section class="booking-card">
      <h2>All In One Car Platform</h2>
      <div class="booking-inputs">
        <!-- Pick-up/Drop-off Location & Date inputs -->
      </div>
    </section>

    <!-- Car Listings Grid -->
    <section class="car-listings">
      <div class="car-card">
        <h3>BMW 3 Series Sedan</h3>
        <img src="car-image.jpg" alt="BMW">
        <div class="specs">Automatic • 4 Seat</div>
        <button class="rent-btn">Rent Now</button>
      </div>
      <!-- Repeat for other cars -->
    </section>
  </main>
</div>

</body>
<script src="index.js"></script>
</html>
